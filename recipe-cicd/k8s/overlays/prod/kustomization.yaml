apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: recipe

resources:
  - ../../base
  - ingress.yaml
  - keycloak-ingress.yaml
  - tenmore-ingress.yaml

configMapGenerator:
  - name: keycloak-realm
    namespace: recipe
    files:
      - recipe-realm.json=recipe-realm.json
    options:
      disableNameSuffixHash: true
  - name: recipe-client-env
    namespace: recipe
    files:
      - env.json=client-env.json
    options:
      disableNameSuffixHash: true

secretGenerator:
  - name: postgres-secret
    envs: [secrets/postgres.env]
    options:
      disableNameSuffixHash: true
  - name: keycloak-secret
    envs: [secrets/keycloak.env]
    options:
      disableNameSuffixHash: true

patches:
  - path: patches/keycloak.yaml
  - path: patches/recipe-server.yaml
  - path: patches/recipe-client.yaml
