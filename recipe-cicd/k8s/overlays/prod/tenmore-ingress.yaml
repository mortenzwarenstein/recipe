apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenmore-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - tenmore.nl
      secretName: tenmore-tls
  rules:
    - host: tenmore.nl
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: recipe-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: recipe-client
                port:
                  number: 80
