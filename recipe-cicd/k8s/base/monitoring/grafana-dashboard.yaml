apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spring-boot
data:
  spring-boot.json: |
    {
      "title": "Recipe Server",
      "uid": "recipe-server",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Uptime",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 60 }
                ]
              }
            }
          },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "process_uptime_seconds{application=\"recipe-server\"}",
            "legendFormat": "Uptime"
          }]
        },
        {
          "id": 2,
          "title": "HTTP Requests / min",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "reqpm", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "sum(rate(http_server_requests_seconds_count{application=\"recipe-server\"}[1m])) * 60",
            "legendFormat": "Requests/min"
          }]
        },
        {
          "id": 3,
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "sum(rate(http_server_requests_seconds_count{application=\"recipe-server\",status=~\"5..\"}[5m])) / sum(rate(http_server_requests_seconds_count{application=\"recipe-server\"}[5m]))",
            "legendFormat": "Error rate"
          }]
        },
        {
          "id": 4,
          "title": "Heap Used",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200000000 },
                  { "color": "red", "value": 400000000 }
                ]
              }
            }
          },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "jvm_memory_used_bytes{application=\"recipe-server\",area=\"heap\"}",
            "legendFormat": "Heap"
          }]
        },
        {
          "id": 5,
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{application=\"recipe-server\"}[1m]))",
              "legendFormat": "{{method}} {{uri}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "HTTP Latency (p99)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{application=\"recipe-server\"}[1m])))",
            "legendFormat": "p99 {{uri}}"
          }]
        },
        {
          "id": 7,
          "title": "JVM Memory",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "jvm_memory_used_bytes{application=\"recipe-server\",area=\"heap\"}",
              "legendFormat": "Heap used"
            },
            {
              "datasource": "Prometheus",
              "expr": "jvm_memory_max_bytes{application=\"recipe-server\",area=\"heap\"}",
              "legendFormat": "Heap max"
            },
            {
              "datasource": "Prometheus",
              "expr": "jvm_memory_used_bytes{application=\"recipe-server\",area=\"nonheap\"}",
              "legendFormat": "Non-heap used"
            }
          ]
        },
        {
          "id": 8,
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "process_cpu_usage{application=\"recipe-server\"}",
              "legendFormat": "Process CPU"
            },
            {
              "datasource": "Prometheus",
              "expr": "system_cpu_usage{application=\"recipe-server\"}",
              "legendFormat": "System CPU"
            }
          ]
        },
        {
          "id": 9,
          "title": "DB Connection Pool",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "hikaricp_connections_active{application=\"recipe-server\"}",
              "legendFormat": "Active"
            },
            {
              "datasource": "Prometheus",
              "expr": "hikaricp_connections_idle{application=\"recipe-server\"}",
              "legendFormat": "Idle"
            },
            {
              "datasource": "Prometheus",
              "expr": "hikaricp_connections_max{application=\"recipe-server\"}",
              "legendFormat": "Max"
            }
          ]
        },
        {
          "id": 10,
          "title": "JVM Threads",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "fieldConfig": { "defaults": { "unit": "short" } },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "jvm_threads_live_threads{application=\"recipe-server\"}",
              "legendFormat": "Live"
            },
            {
              "datasource": "Prometheus",
              "expr": "jvm_threads_daemon_threads{application=\"recipe-server\"}",
              "legendFormat": "Daemon"
            }
          ]
        }
      ]
    }
