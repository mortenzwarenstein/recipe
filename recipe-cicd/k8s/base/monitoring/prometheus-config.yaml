apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: recipe-server
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['recipe-server:8080']
