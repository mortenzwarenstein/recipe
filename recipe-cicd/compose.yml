services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recipedb
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak/recipe-realm.json:/opt/keycloak/data/import/recipe-realm.json
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/recipe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  k3s:
    image: rancher/k3s:latest
    command: server
    privileged: true
    environment:
      K3S_TOKEN: recipe-cluster-token
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "644"
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - ./kubeconfig:/output
    ports:
      - "6443:6443"
      - "80:80"
      - "443:443"
    tmpfs:
      - /run
      - /var/run
    profiles:
      - k3s

volumes:
  postgres_data:
  k3s-server:
