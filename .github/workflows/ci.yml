name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'recipe-server/**'
            client:
              - 'recipe-client/**'

  test-server:
    name: Test server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Run tests
        working-directory: recipe-server
        run: ./gradlew test

  test-client:
    name: Test client
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.client == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: recipe-client/package-lock.json
      - name: Install dependencies
        working-directory: recipe-client
        run: npm ci
      - name: Run tests
        working-directory: recipe-client
        run: npm test

  # Single required status check — always runs, fails if any test job failed.
  # Configure this job as the required branch protection check in GitHub settings.
  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test-server.result }}" == "failure" || "${{ needs.test-client.result }}" == "failure" ]]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All tests passed (or were skipped due to no relevant changes)."
