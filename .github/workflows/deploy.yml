name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'recipe-server/**'
            client:
              - 'recipe-client/**'

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.client == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        if: needs.changes.outputs.server == 'true'
        run: bash recipe-cicd/build.sh server

      - name: Build and push client
        if: needs.changes.outputs.client == 'true'
        run: bash recipe-cicd/build.sh client

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always() && needs.build.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install sops
        run: |
          curl -sL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - name: Write secrets
        run: |
          mkdir -p ~/.kube ~/.config/sops/age
          echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.kube/config ~/.config/sops/age/keys.txt

      - name: Deploy
        run: |
          KUBECONFIG="$HOME/.kube/config" \
          SOPS_AGE_KEY_FILE="$HOME/.config/sops/age/keys.txt" \
          bash recipe-cicd/k8s/apply.sh prod
