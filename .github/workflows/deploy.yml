name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      cicd:   ${{ steps.filter.outputs.cicd }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'recipe-server/**'
            client:
              - 'recipe-client/**'
            cicd:
              - 'recipe-cicd/**'

  test-server:
    name: Test server
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
      - name: Run tests
        working-directory: recipe-server
        run: ./gradlew test

  test-client:
    name: Test client
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.client == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: recipe-client/package-lock.json
      - name: Install dependencies
        working-directory: recipe-client
        run: npm ci
      - name: Run tests
        working-directory: recipe-client
        run: npm test

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [changes, test-server, test-client]
    if: |
      always() &&
      (needs.changes.outputs.server == 'true' || needs.changes.outputs.client == 'true') &&
      needs.test-server.result != 'failure' &&
      needs.test-client.result != 'failure'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        if: needs.changes.outputs.server == 'true'
        run: bash recipe-cicd/build.sh server

      - name: Build and push client
        if: needs.changes.outputs.client == 'true'
        run: bash recipe-cicd/build.sh client

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.changes.outputs.cicd == 'true') &&
      needs.build.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Install sops
        run: |
          curl -sfL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops
          sops --version

      - name: Write secrets
        run: |
          mkdir -p ~/.kube ~/.config/sops/age
          echo "${{ secrets.KUBECONFIG_PROD }}" > ~/.kube/config
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.kube/config ~/.config/sops/age/keys.txt

      - name: Deploy
        run: |
          KUBECONFIG="$HOME/.kube/config" \
          SOPS_AGE_KEY_FILE="$HOME/.config/sops/age/keys.txt" \
          bash recipe-cicd/k8s/apply.sh prod
