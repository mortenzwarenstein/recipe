<div class="relative">
  <input
    type="text"
    [formControl]="inputControl"
    (focus)="onFocus()"
    (blur)="onBlur()"
    placeholder="e.g. The Silver Spoon"
    class="field-input"
  />
  @if (showDropdown()) {
    <ul class="absolute z-10 w-full mt-1 bg-parchment-50 border border-parchment-300 rounded-lg shadow-lg overflow-hidden">
      @for (book of suggestions(); track book) {
        <li
          (mousedown)="selectSuggestion(book)"
          class="px-4 py-2.5 text-sm text-espresso-900 cursor-pointer hover:bg-parchment-100 transition-colors"
        >
          {{ book }}
        </li>
      }
    </ul>
  }
</div>
