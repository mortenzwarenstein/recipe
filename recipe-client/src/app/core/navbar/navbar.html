<nav class="bg-espresso-900 border-b sticky top-0 z-50">
  <div class="h-14 max-w-5xl mx-auto px-5 sm:px-6 flex items-center justify-between">
    <a routerLink="/home" class="font-display italic text-xl text-parchment-100 leading-none">Recipe</a>

    @if (isAuthenticated()) {
      <button
        (click)="toggleMenu()"
        [attr.aria-expanded]="isOpen()"
        aria-label="Toggle menu"
        class="navbar-burger"
      >
        <div class="navbar-burger-lines" [class.is-open]="isOpen()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </button>
    }
  </div>
</nav>

@if (isAuthenticated()) {
  <div
    class="navbar-backdrop fixed inset-0 top-14 z-40"
    [class.is-visible]="isOpen()"
    (click)="toggleMenu()"
  ></div>

  <div
    class="navbar-drawer"
    [class.is-open]="isOpen()"
    role="dialog"
    aria-label="Navigation menu"
  >
    <div class="navbar-drawer-inner">
      <div class="navbar-user">
        <p class="navbar-user-label">Signed in as</p>
        <p class="navbar-user-name">{{ username() }}</p>
      </div>

      <nav class="navbar-nav">
        <a routerLink="/meal-plan" routerLinkActive="menu-item-active" class="menu-item">Week plan</a>
        <a routerLink="/recipes" routerLinkActive="menu-item-active" class="menu-item">Recipes</a>
        <a routerLink="/recipes/new" routerLinkActive="menu-item-active" class="menu-item">Add recipe</a>
        <button (click)="logout()" class="menu-item menu-item-signout">Sign out</button>
      </nav>
    </div>
  </div>
}
