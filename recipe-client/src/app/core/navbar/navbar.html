<nav class="sticky top-0 z-50 bg-blue-600 shadow-md">
  <div class="h-14 max-w-screen-lg mx-auto px-4 sm:px-6 flex items-center justify-between">
    <a routerLink="/" class="font-bold text-white text-lg tracking-tight">Recipe</a>

    @if (isAuthenticated()) {
      <button
        (click)="toggleMenu()"
        [attr.aria-expanded]="isOpen()"
        aria-label="Toggle menu"
        class="w-8 h-8 flex items-center justify-center cursor-pointer text-white"
      >
        @if (isOpen()) {
          <!-- Close icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <!-- Burger icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>
    }
  </div>
</nav>
@if (isAuthenticated()) {
  <div
    class="fixed inset-0 top-14 z-40 bg-blue-700 transition-transform duration-300 ease-in-out overflow-y-auto"
    [class.translate-x-0]="isOpen()"
    [class.translate-x-full]="!isOpen()"
  >
    <div class="px-6 py-10 flex flex-col h-full">
      <div class="mb-8">
        <p class="text-blue-200 text-sm mb-1">Signed in as</p>
        <p class="text-white text-2xl font-semibold whitespace-nowrap overflow-hidden text-ellipsis">{{ username() }}</p>
      </div>

      <nav class="flex flex-col divide-y divide-blue-600">
        <a
          routerLink="/recipes"
          class="menu-item"
        >
          Recipes
        </a>
        <a
          routerLink="/recipes/new"
          class="menu-item"
        >
          Add recipe
        </a>
        <a routerLink="/recipes/pick" class="menu-item">
          Pick recipe
        </a>
        <a routerLink="/meal-plan" class="menu-item">
          Week plan
        </a>
        <button
          (click)="logout()"
          class="menu-item text-left cursor-pointer"
        >
          Sign out
        </button>
      </nav>
    </div>
  </div>
}
